name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    name: Lint & unit tests
    # Run the pure-logic suite on more than one OS so platform-specific
    # regressions (path separators, line endings, shell assumptions) surface in
    # CI rather than on a contributor's machine — a named gap in #138.
    # `fail-fast: false` so one OS failing still reports the others.
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    # The stub/install steps below use POSIX shell (`printf`, `mkdir -p`); `bash`
    # routes them through Git Bash on the Windows runner too. LF is enforced via
    # .gitattributes so `prettier --check` doesn't trip over CRLF checkouts.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm

      # `@harnext/core` is a local sibling package
      # ("@harnext/core": "file:../harnext/packages/core") that isn't present on
      # CI runners, so a plain install can't resolve it. Stub it so lint + unit
      # tests can run. To also enable typecheck / build / integration tests,
      # replace this step with the real package (e.g. checkout & build the
      # harnext repo alongside, or publish/vendor it). See #16.
      - name: Stub @harnext/core (CI placeholder)
        run: |
          mkdir -p ../harnext/packages/core
          printf '%s' '{"name":"@harnext/core","version":"0.0.0","main":"index.js","types":"index.d.ts"}' > ../harnext/packages/core/package.json
          printf 'module.exports = {}\n' > ../harnext/packages/core/index.js
          printf 'export {}\n' > ../harnext/packages/core/index.d.ts

      # --ignore-scripts skips the postinstall that rebuilds the native
      # better-sqlite3 for Electron — not needed for the pure-logic unit tests.
      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Lint
        run: npm run lint

      # Typecheck the renderer (the whole UI: components, stores, views, libs +
      # shared types). It imports nothing from @harnext/core, so `tsc` runs in CI
      # without the real package — catching type errors that previously only
      # surfaced locally (#138). The main process still can't be typechecked here
      # (it needs core's real types — see the stub note above / #16). Run once
      # (ubuntu) since tsc is deterministic across OSes.
      - name: Typecheck (renderer)
        if: matrix.os == 'ubuntu-latest'
        run: npm run typecheck:web

      # Catch source formatting drift before it lands (a named gap in #138).
      - name: Format check
        run: npm run format:check

      - name: Unit tests + coverage
        run: npm run test:coverage

      # Surface known vulnerabilities in dependencies — advisory only (`|| true`),
      # so it never blocks a PR, but the findings show up in the CI log. Runs once
      # on ubuntu. A named dependency-hygiene gap in #138; Dependabot (see
      # .github/dependabot.yml) keeps them patched.
      - name: Audit dependencies (advisory)
        if: matrix.os == 'ubuntu-latest'
        run: npm audit --audit-level=high || true

  # The `lint-test` job above runs against a *stub* @harnext/core, which is enough
  # for lint / renderer-typecheck / unit tests but CANNOT typecheck the main process
  # (it imports core's real types) or run `electron-vite build`. This job closes
  # that gap (#138): it checks out + builds the real @harnext/core alongside (the
  # same sibling-workspace pattern release.yml already uses) and runs `npm run
  # build`, which is `npm run typecheck && electron-vite build` — so a type error or
  # build break in the main process now fails CI instead of reaching `main`. Ubuntu
  # only: tsc is deterministic across OSes and electron-vite build isn't packaging.
  typecheck-build:
    name: Typecheck (main + renderer) & build
    runs-on: ubuntu-latest
    steps:
      # Check both repos out as siblings so the package.json's
      # `file:../harnext/packages/core` dependency resolves.
      - name: Checkout harnext-desktop
        uses: actions/checkout@v7
        with:
          path: harnext-desktop

      - name: Checkout @harnext/core
        uses: actions/checkout@v7
        with:
          repository: QualityUnit/harnext
          path: harnext
          # Public → github.token works; private → set a HARNEXT_TOKEN PAT secret.
          token: ${{ secrets.HARNEXT_TOKEN || github.token }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: harnext-desktop/package-lock.json

      - name: Build @harnext/core
        working-directory: harnext
        run: |
          # onnxruntime-node downloads a prebuilt binary from a CDN during install
          # and intermittently fails with ECONNRESET — retry transient blips.
          retry() { local a; for a in 1 2 3; do "$@" && return 0; echo "::warning::'$*' failed (attempt $a/3), retrying in 20s"; sleep 20; done; echo "::error::'$*' failed after 3 attempts"; return 1; }
          retry npm ci
          npm -w packages/core run build

      # Pack @harnext/core and install the tarball so its transitive deps actually
      # land in node_modules (a bare `file:` symlink leaves them in the sibling
      # tree — #74). `--ignore-scripts` skips the better-sqlite3 native rebuild:
      # electron-vite build externalizes the native addon, so typecheck + build
      # don't need it.
      - name: Install desktop dependencies (@harnext/core as a packed tarball)
        working-directory: harnext-desktop
        run: |
          retry() { local a; for a in 1 2 3; do "$@" && return 0; echo "::warning::'$*' failed (attempt $a/3), retrying in 20s"; sleep 20; done; echo "::error::'$*' failed after 3 attempts"; return 1; }
          retry npm install --ignore-scripts --no-audit --no-fund
          TARBALL=$(cd ../harnext/packages/core && npm pack --silent | tail -1)
          retry npm install "../harnext/packages/core/$TARBALL" --ignore-scripts --no-audit --no-fund

      # `npm run build` === `npm run typecheck && electron-vite build`, so this one
      # step typechecks BOTH the main process and the renderer, then builds.
      - name: Typecheck (node + web) & build
        working-directory: harnext-desktop
        run: npm run build
