name: Release

# Build harnext-desktop for Linux, Windows and macOS and publish the installers
# to a GitHub Release whenever a version tag is pushed (e.g. `git tag v0.2.0`).
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release and upload installer assets

jobs:
  # electron-builder's own GitHub publisher proved unworkable here: it can't find an
  # existing *draft* by tag (get-release-by-tag 404s on drafts) so every platform job
  # created a duplicate draft, and when the release is pre-created *published* it
  # silently refuses to upload into it. So we don't use its publisher at all — each
  # platform builds with `--publish never` and uploads its installers as workflow
  # artifacts; a single `publish` job then assembles one release from all of them.
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false # one OS failing shouldn't drop the others' artifacts
      matrix:
        include:
          - os: macos-latest
            script: build:mac
          - os: windows-latest
            script: build:win
          - os: ubuntu-latest
            script: build:linux
    steps:
      # The desktop and @harnext/core live as siblings so the package.json's
      # `file:../harnext/packages/core` dependency resolves: check both out under
      # the workspace as `harnext-desktop/` and `harnext/`.
      - name: Checkout harnext-desktop
        uses: actions/checkout@v4
        with:
          path: harnext-desktop

      # The real @harnext/core — the CI lint/test stub (see ci.yml / #16) is not
      # enough for a release build, which imports the actual package.
      - name: Checkout @harnext/core
        uses: actions/checkout@v4
        with:
          repository: QualityUnit/harnext
          path: harnext
          # Public → github.token works; private → set a HARNEXT_TOKEN PAT secret.
          token: ${{ secrets.HARNEXT_TOKEN || github.token }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Build @harnext/core
        working-directory: harnext
        # Force bash on all runners; windows-latest defaults `run:` to PowerShell,
        # which can't parse the POSIX shell syntax these steps use.
        shell: bash
        run: |
          # onnxruntime-node (a @harnext/core dep) downloads a prebuilt binary from
          # a CDN during install and intermittently fails with ECONNRESET. Retry so
          # a transient network blip doesn't sink the release — the publish job
          # needs every platform's build to succeed.
          retry() { local a; for a in 1 2 3; do "$@" && return 0; echo "::warning::'$*' failed (attempt $a/3), retrying in 20s"; sleep 20; done; echo "::error::'$*' failed after 3 attempts"; return 1; }
          retry npm ci
          npm -w packages/core run build

      # `npm install` runs the postinstall (`electron-builder install-app-deps`),
      # which rebuilds the native better-sqlite3 against this runner's Electron —
      # required per platform/arch.
      #
      # The `file:../harnext/packages/core` dep only symlinks @harnext/core; its
      # transitive deps stay in the sibling workspace, outside this tree, so
      # electron-builder can't bundle them and the packaged app crashes on launch
      # (#74, and the README "Packaging" note). Pack @harnext/core and install the
      # tarball so it's a real package whose deps land in node_modules.
      - name: Install desktop dependencies (@harnext/core as a packed tarball)
        working-directory: harnext-desktop
        shell: bash # `TARBALL=$(...)` is POSIX syntax; PowerShell on windows-latest rejects it.
        run: |
          retry() { local a; for a in 1 2 3; do "$@" && return 0; echo "::warning::'$*' failed (attempt $a/3), retrying in 20s"; sleep 20; done; echo "::error::'$*' failed after 3 attempts"; return 1; }
          retry npm install --no-audit --no-fund
          TARBALL=$(cd ../harnext/packages/core && npm pack --silent | tail -1)
          retry npm install "../harnext/packages/core/$TARBALL" --no-audit --no-fund

      - name: Build installers (no publish)
        working-directory: harnext-desktop
        shell: bash
        env:
          # macOS code-signing. CSC_LINK is electron-builder's *shared* cert env
          # var, so it MUST be scoped to the mac job — otherwise the Windows runner
          # would try to sign with the macOS .p12. Empty elsewhere ⇒ no signing
          # attempted (electron-builder just warns and ships an unsigned build).
          CSC_LINK: ${{ matrix.os == 'macos-latest' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.os == 'macos-latest' && secrets.CSC_KEY_PASSWORD || '' }}
          # Notarization credentials (read by electron-builder only for mac).
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarize only when the mac build actually has the Apple credentials, so
          # tagging a release before those two secrets exist still succeeds (it
          # signs but skips notarization) instead of hard-failing.
          NOTARIZE: ${{ matrix.os == 'macos-latest' && secrets.APPLE_ID != '' && secrets.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          EXTRA=()
          if [ "$NOTARIZE" = "true" ]; then EXTRA+=(--config.mac.notarize=true); fi
          npm run ${{ matrix.script }} -- --publish never "${EXTRA[@]}"

      # Each runner's installers (plus the auto-update *.yml / *.blockmap metadata)
      # land in harnext-desktop/dist. Hand them to the publish job as an artifact.
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: error
          path: |
            harnext-desktop/dist/*.exe
            harnext-desktop/dist/*.dmg
            harnext-desktop/dist/*.zip
            harnext-desktop/dist/*.AppImage
            harnext-desktop/dist/*.deb
            harnext-desktop/dist/*.snap
            harnext-desktop/dist/*.blockmap
            harnext-desktop/dist/latest*.yml

  # One release, assembled from every platform's artifacts — no electron-builder
  # publisher, no duplicate drafts.
  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          pattern: installers-*
          merge-multiple: true # flatten every platform's files into installers/

      - name: Create the release and upload installers
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --notes "Automated release ${{ github.ref_name }} — installers for macOS, Windows and Linux." \
            installers/* \
          || gh release upload "${{ github.ref_name }}" installers/* \
               --repo "${{ github.repository }}" --clobber
